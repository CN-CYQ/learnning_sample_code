<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="container">
        <div class="img-box">
            <img class="img-main" src="./sources/小图.png" alt="">
            <!-- 放大镜盒子 -->
            <div class="scale-box" draggable="true">
                
            </div>
            <!-- <img class="scale-img" src="./sources/大图.png" alt=""> -->
        </div>

        <div class="scale-content">

        </div>

        <!-- 图片列表 -->
         <div class="img-list">
            <img src="../../../sources/feaf9abd5c1cd19086.jpg" alt="">
            <img src="../../../sources/2126e013d3f9ba08b5.jpg" alt="">
            <img src="../../../sources/d207c09dedb93846b5.jpg" alt="">
            <img src="../../../sources/小米仔.png" alt="">
         </div>

    </div>

    <script>
        const imgBox = document.querySelector('.img-box');
        const imgList = document.querySelectorAll('.img-list img');
        const scaleImg = document.querySelector('.scale-img');
        const scaleBox = document.querySelector('.scale-box');
        const scaleContent = document.querySelector('.scale-content');
        // const imgList = document.querySelectorAll('.img-list img');
        window.addEventListener('load', function () { 
            imgBox.children[0].src = imgList[0].src;
            // console.log("hhhhh",imgMain.offsetTop, imgMain.offsetLeft);
            imgBox[1].style.top = imgBox.children[0].offsetTop + 'px';
            imgBox[1].style.left = imgBox.children[0].offsetLeft + 'px';
        })  
        imgList.forEach(item => {
            item.addEventListener('mouseenter', function () {
                imgBox.children[0].src = item.src;
                
            })
        })  


        // 移入主相片 显示放大镜
        imgBox.children[0].addEventListener('mouseenter', function (e) {
            scaleContent.style.backgroundImage = `url(${imgBox.children[0].src})`;
            imgBox.children[1].style.display = 'block';
            const element = document.elementFromPoint(e.clientX, e.clientY);
            // console.log(e.pageX, e.pageY);
            console.log(e.pageX, e.pageY);
            // console.log(imgBox.children[1].style.left, imgBox.children[1].style.top);
            imgBox.children[1].style.left = e.pageX - 50 + 'px';
            imgBox.children[1].style.top = e.pageY - 50 + 'px';

            scaleContent.style.backgroundPosition = `-${e.offsetX - 38}px -${e.offsetY - 38}px`;
            
        })
        imgBox.children[0].addEventListener('mouseleave', function () {
            // scaleImg.src = imgMain.src;
            imgBox.children[1].style.display = 'none';
        })

    </script>
    

    
</body>
</html>
