<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 200px;
            height: 200px;
            background-color: rgb(143, 143, 143);
            text-align: center;
            line-height: 200px;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <div class="box">
        
    </div>
    <script src="../../node_modules/lodash/lodash.js"></script>
    <script>
        const box = document.querySelector('.box')
        let timer = 0;
        box.innerHTML = timer
        function mousemove(){
            box.innerHTML = timer++
        }

        // Loadash库的debounce方法实现防抖
        // const debounceMove = _.debounce(mousemove, 1000)
        // box.addEventListener('mousemove',debounceMove)

        // 手动封装
        function debounce(fn, delay){
            let timer = null
            // 返回一个匿名函数
            return function(){
                if(timer){
                    clearTimeout(timer)
                }
                timer = setTimeout(() => {
                    fn.apply(this, arguments)
                }, delay)
            }
        }
        box.addEventListener('mousemove',debounce(mousemove, 500))


    </script>
</body>
</html>
