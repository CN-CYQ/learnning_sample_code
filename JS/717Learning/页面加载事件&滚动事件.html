    <script>
        // // 页面加载事件
        // window.addEventListener("load", () => {

        // img.addEventListener('load', () => {

        // 滚动事件
        // 监听页面滚动事件
        window.addEventListener('scroll', (e) => {
            // 事件对象获取滚动距离
            // console.log("滚动事件触发",parseInt(e.target.scrollTop));

            console.log(parseInt(document.documentElement.scrollTop));
        })

        // 监听某个元素的滚动事件
        const div1 = document.querySelector('div');
        div1.addEventListener('scroll', (e) => {
            console.log("滚动事件触发",parseInt(e.target.scrollTop));
            div1.style.backgroundColor = `rgba(2, 183, 114, ${e.target.scrollTop / 1000})`;
        })
    </script>
    
</body>
