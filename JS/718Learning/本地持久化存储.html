<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        // 本地持久化存储
        // localStorage
        // 存储数据
        localStorage.setItem('name', '张三')
        // 获取数据
        console.log(localStorage.getItem('name'));
        // 删除数据
        localStorage.removeItem('name')
        // 清空所有数据
        localStorage.clear()
    </script>
    
</body>
</html>
