<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        console. log(1111)
        setTimeout(function () {
            console.log(2222)
        }, 1000)
        console.log(3333)
        //问,输出的结果是什么?

        console. log(1111)
        setTimeout(function () {
            console.log(2222)
        }, 0)
        console.log(3333)
        //问,输出的结果是什么?

        // join方法：将数组元素用指定的字符串连接起来
        const arr = ['red', 'green', 'blue', 'yellow', 'orange']
        console.log(arr.join('-')) //red-green-blue-yellow-orange   
    </script>
</body>
</html>
