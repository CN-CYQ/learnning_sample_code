<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div></div>
    <script>
        const div = document.querySelector('div')
        // 延时函数：setTimeout()
        setTimeout(function(){
            div.innerHTML = '我是延时函数'
        }, 3000)
    </script>
</body>
</html>
