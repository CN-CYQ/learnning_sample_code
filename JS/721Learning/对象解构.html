    <script>

        }

        // 解构时，uname与之前声明变量命名冲突，要进行改名
        const {uname: username, age: userage} = obj1

        // 数组对象解构
        const arr = [
            {
                name: '张三',
                age: 18,
                sex: '男'
            },
            {
                name: '李四',
                age: 19,

        const pig = [

                },

            }
        ]
        const [{name:name2, age:age2, family: { mother, father, brother}, sex:sex2}] = pig
        console.log(name2, age2, mother, father, brother, sex2)
