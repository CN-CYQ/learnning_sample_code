<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 600px;
            margin: 0;
            padding: 0;
            position: relative;
        }
        img {
            width: 600px;
            
        }
        .cover {
            width: 100%;
            height: 100%;
            /* background-color: aqua; */
            position: absolute;
            top: 0%;
            left: 0%;
            display: flex;
            justify-content: space-between;
            align-items: center;

            
        }
        .left-btn, .right-btn {
            /* margin: 0 auto; */
            width: 60px;
            text-align: center;
            display: none;
            font-size: 24px;
            cursor: pointer;
            color: white;
            background-color: #3030308b;
        }

        .container:hover .left-btn, .container:hover .right-btn {
            display: block;
        }

        .titlebar {
            display: inline;
            
            line-height: 50px;
            position: absolute;
            width: 100%;
            height: 50px;
            bottom: 0;
            background-image: linear-gradient(to bottom, #f2f2f24f 10%, #000000);
            /* box-shadow: 0 0 10px rgba(0, 0, 0, 0.5) inset; */
        }
        .title {
            float: left;
            width: 70%;
            font-size: 24px;
            color: rgb(255, 0, 0);
            text-align: left;
        }
         
        .dote {
            float: right;
            width: 30%;
            text-align: right;
        }
        .dotes{
            width: 10px;
            height: 10px;
            background-color: rgb(223, 223, 223);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }

        .active {
            background-color: rgb(230, 18, 18);
        }
        

        
        
        
    </style>
    
</head>
<body>
    <div class="container">
        <img src="../imgs/尚品汇1.png" alt="">
        <div class="cover">
            <div class="left-btn"> < </div>
            <div class="right-btn"> > </div>

            <div class="titlebar">
                <div class="title">便宜大耍买，买买买</div>
                <div class="dote" >
                    <span class="dotes active"></span>
                    <span class="dotes"></span>
                    <span class="dotes"></span>
                    
                </div>
            </div>
        </div>

        
    </div>


    <script>
        const dotesCount = 3;
        const infoArr = [
            {
                title: "便宜大耍买，买买买",
                image: "../imgs/尚品汇1.png",
            },
            {
                title: "尚品汇2.png",
                image: "../imgs/尚品汇2.png",
            },
            {
                title: "尚品汇3.png",
                image: "../imgs/尚品汇3.png",
            },
        ]
        let currentIndex = 0;

        const container = document.querySelector(".container");
        const image = document.querySelector("img");
        const leftBtn = document.querySelector(".left-btn");
        const rightBtn = document.querySelector(".right-btn");
        const titlebar = document.querySelector(".titlebar .title");
        

        
        leftBtn.addEventListener("click", function () {
            currentIndex--;
            if(currentIndex < 0) {
                currentIndex = infoArr.length - 1;
            }
            image.src = infoArr[currentIndex].image;
            titlebar.innerHTML = infoArr[currentIndex].title;
            // 清除第一个active
            document.querySelector(`.dote .active`).classList.remove('active');
            // 给当前图片原点添加active类
            document.querySelector(`.dote span:nth-child(${currentIndex+1})`).classList.add('active');
        })
        rightBtn.addEventListener("click", function () {
            currentIndex++;
            if(currentIndex >= infoArr.length) {
                currentIndex = 0;
            }

            image.src = infoArr[currentIndex].image;
            titlebar.innerHTML = infoArr[currentIndex].title;
            // 清除第一个active
            document.querySelector(`.dote .active`).classList.remove('active');
            // 给当前图片原点添加active类
            document.querySelector(`.dote span:nth-child(${currentIndex+1})`).classList.add('active');
            
        })
        let timer = setInterval(() => {
            
            rightBtn.click()
        }, 3000);

        container.addEventListener('mouseover', function () {
            
            clearInterval(timer);
        })
        container.addEventListener('mouseout', function () {
            timer = setInterval(() => {
                rightBtn.click()
            }, 3000);
        })

    </script>
</body>
</html>
