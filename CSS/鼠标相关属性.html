<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            /* min-width: 1400px; */
        }
        /* .first-line {
            display: inline;
            flex-wrap: nowrap;
        } */
        .cell-fill {
            
            background-color: gray;
            float: left;
            line-height: 50px;
            text-align: center;
            vertical-align: middle;
        }
        .center {
            
            width: 540px;
            height: 50px;
            margin: 0 10px;
        }
        .left,.right {
            
            width: 200px;
            height: 50px;
        }
        .first-line::after {
            content: "";
            display: block;
            clear: both;
        }
        .second-line {
            width: 960px;
            background-color: gray;
            margin: 10px 0;
            text-align: center;
        }


        .first-column {
            float: left;
        }
        .second-column {
            margin: 0 10px;
            float: left;
        }

        .first-column,.second-column {
            width: 370px;
            
        }
        
        .third-column {
            width: 200;
            float: right;
        }

        .cell-empty {
            border: 1px solid black;
            text-align: center;
        }
        .cell-big {
            width: 100%;
            height: 200px;
        }

        .underline {
            display: flex;
            flex-wrap: nowrap;
        }
        .cell-middle {
            width: 180px;
            height: 200px;
            border: 1px solid black;
            float: left;
            margin-top: 10px;
            text-align: center;
        }
        .s-left {
            
            margin-right: 10px;
            
        }
        .cell-small {
            width: 199px;
            height: 126px;
        }
        .cell-small:nth-child(2){
            margin: 10px 0px;
        }

        .content {
            width: 960px;
            display: flex;
            flex-wrap: nowrap;
        }
        .content::after {
            content: "";
            display: block;
            clear: both;
        }
        .bottom {
            height: 100px;
            width: 960px;
            background-color: gray;
            text-align: center;
            line-height: 100px;
            margin-top: 10px;
        }
        
        
    </style>
</head>
<body>

    <div class="top">
        <div class="first-line">
            <div class="cell-fill left">logo</div>
            <div class="cell-fill center">banner1</div>
            <div class="cell-fill right">banner2</div>
        </div>
        <div class="second-line">菜单</div>

    </div>

    <div class="content">
        <div class="first-column">

            <div class="cell-empty cell-big">
                栏目1
            </div>
            <div class="underline">
                <div class="cell-middle s-left">栏目三</div>
                <div class="cell-middle s-right">栏目四</div>
            </div>
        </div>
        <div class="second-column">

            <div class="cell-empty cell-big">
                栏目二
            </div>
            <div class="underline">
                <div class="cell-middle s-left">栏目五</div>
                <div class="cell-middle s-right">栏目六</div>
            </div>
        </div>

        <div class="third-column">
            <div class="cell-empty cell-small">栏目七</div>
            <div class="cell-empty cell-small">栏目八</div>
            <div class="cell-empty cell-small">栏目九</div>
        </div>

    </div>
    <div class="bottom">
        页脚
    </div>
    
</body>
</html>
